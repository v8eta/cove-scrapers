# Original scraper for Cove, informed by stashapp/CommunityScrapers scrapers/Babepedia/Babepedia.py
# (https://github.com/stashapp/CommunityScrapers — AGPL-3.0). The upstream Babepedia scraper is a
# Python script (action: script), which Cove's YAML engine cannot run, so this is a from-scratch
# YAML reimplementation of its field logic against babepedia.com's server-rendered HTML.
#
# Port notes (2026-07-20):
# - Search uses Babepedia's own JSON endpoint (/ajax-search.php?term=) via scrapeJson.
# - Babepedia sits behind Cloudflare with UA-string filtering: curl gets 403, but ordinary
#   HTTP clients sending a full browser User-Agent pass without a JS challenge. If scrapes
#   start returning nothing, check what UA Cove's scrape client sends.
# - Country: Babepedia renders a flag icon + "(American)" — we extract the demonym in
#   parentheses and map it to a country name (map borrowed from the Boobpedia scraper).
# - Upstream fetched every gallery image as base64; YAML takes the first profile image URL.
# - No lookaheads anywhere: Cove's regex engine is RE2-style (lookaheads silently fail).

name: Babepedia
performerByURL:
  - action: scrapeXPath
    url:
      - babepedia.com/babe/
    scraper: performerScraper
performerByName:
  action: scrapeJson
  queryURL: "https://www.babepedia.com/ajax-search.php?term={}"
  scraper: performerSearch
jsonScrapers:
  performerSearch:
    performer:
      Name: "#.label"
      URLs:
        selector: "#.value"
        postProcess:
          - replace:
              - regex: \s
                with: "_"
              - regex: ^
                with: "https://www.babepedia.com/babe/"
xPathScrapers:
  performerScraper:
    performer:
      Name: //h1[@id="babename"]
      Gender:
        # Babepedia only profiles female performers
        fixed: Female
      Aliases:
        selector: //h2[@id="aka"]
        postProcess:
          - replace:
              - regex: '^\s*(Also known as:|aka)\s*'
                with: ""
              - regex: \s+-\s+
                with: ", "
      Birthdate:
        # "23rd of January" + "1992" as two links -> "23 of January 1992"
        selector: //span[@class="label" and contains(text(),"Born:")]/following-sibling::span/a
        concat: " "
        postProcess:
          - replace:
              - regex: (\d+)(st|nd|rd|th)
                with: $1
          - parseDate: 2 of January 2006
      DeathDate:
        # "Sunday 3rd of March 2024 (aged 32)" -> "3 of March 2024"
        selector: //span[@class="label" and contains(text(),"Died")]/following-sibling::span
        postProcess:
          - replace:
              - regex: ^\s*[A-Za-z]+\s+
                with: ""
              - regex: (\d+)(st|nd|rd|th)
                with: $1
              - regex: \s*\(.*$
                with: ""
          - parseDate: 2 of January 2006
      Ethnicity:
        selector: //span[@class="label" and contains(text(),"Ethnicity")]/following-sibling::span/a
      EyeColor:
        selector: //span[@class="label" and contains(text(),"Eye color")]/following-sibling::span/a
      HairColor:
        selector: //span[@class="label" and contains(text(),"Hair color")]/following-sibling::span/a
        postProcess:
          - map:
              "Brown": "Brunette"
      Height:
        # `5'1" (or 154 cm)` -> 154
        selector: //span[@class="label" and contains(text(),"Height")]/following-sibling::span
        postProcess:
          - replace:
              - regex: .*?(\d+)\s*cm.*
                with: $1
      Weight:
        # "111 lbs (or 50 kg)" -> 50
        selector: //span[@class="label" and contains(text(),"Weight")]/following-sibling::span
        postProcess:
          - replace:
              - regex: .*?(\d+)\s*kg.*
                with: $1
      Measurements:
        # measurements span: "39-27-35 (B-W-H) ..." (en-dashes), cup span: "30K show conversions"
        # combined -> "30K-27-35" (cup-waist-hip, like the upstream Python)
        selector: //span[@class="label" and contains(text(),"Measurements")]/following-sibling::span | //span[@class="label" and contains(text(),"Bra/cup size")]/following-sibling::span/text()[1]
        concat: "|"
        postProcess:
          - replace:
              - regex: (\d+)[–-](\d+)[–-](\d+)[^|]*\|\s*(\d+[A-Za-z]+).*
                with: $4-$2-$3
              - regex: \|.*$ # no cup size scraped -> drop the trailing part
                with: ""
              - regex: \s*\(.*$ # drop "(B-W-H)" annotation when cup was absent
                with: ""
              - regex: "–"
                with: "-"
      FakeTits:
        selector: //span[@class="label" and contains(text(),"Boobs")]/following-sibling::span/a
        postProcess:
          - map:
              "Real/Natural": "Natural"
              "Fake/Enhanced": "Fake"
      Tattoos:
        selector: //span[@class="label" and contains(text(),"Tattoos")]/following-sibling::span
        postProcess:
          - replace:
              - regex: ^None$
                with: ""
      Piercings:
        selector: //span[@class="label" and contains(text(),"Piercings")]/following-sibling::span
        postProcess:
          - replace:
              - regex: ^None$
                with: ""
      CareerLength:
        # "2011-2023 (started around 19 years old...)" / "2011-Present (...)"
        selector: //span[@class="label" and contains(text(),"Years active")]/following-sibling::span
        postProcess:
          - replace:
              - regex: (?i)^(\d+)\s*-\s*present.*
                with: $1 -
              - regex: ^(\d+)\s*-\s*(\d+).*
                with: $1 - $2
      Details:
        selector: //p[@id="biotext"]
      Image:
        # first main profile image; hrefs are URL-encoded relative paths (/pics/Name%20x.jpg)
        selector: (//div[@id="profbox2"]//a[@class="img"])[1]/@href
        postProcess:
          - replace:
              - regex: ^
                with: https://www.babepedia.com
      URLs:
        # social links; Babepedia proxies OnlyFans through its own domain
        selector: //div[@id="socialicons"]/a/@href
        postProcess:
          - replace:
              - regex: ^https://www\.babepedia\.com/onlyfans/
                with: https://onlyfans.com/
              - regex: ^/onlyfans/
                with: https://onlyfans.com/
      Country:
        # flag icon + "(American)" -> demonym -> country name
        selector: //span[@class="label" and contains(text(),"Nationality")]/following-sibling::span
        postProcess:
          - replace:
              - regex: .*\(([^)]+)\).*
                with: $1
          - map:
